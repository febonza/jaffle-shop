<!doctype html>
<html><head><meta charset="utf-8"><title>Stat block</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); }
  .row { display:grid; grid-template-columns:repeat(4, 1fr); gap:0; border-top:1px solid #111; border-bottom:1px solid #111; }
  .cell { padding:16px 12px 16px 0; border-right:1px solid var(--rule-soft); }
  .cell:last-child { border-right:0; padding-left:16px; padding-right:0; }
  .cell:not(:first-child) { padding-left:16px; }
  .fig { font: 500 36px/1 var(--font-mono); color:#111; letter-spacing:-0.02em; font-variant-numeric:tabular-nums; }
  .fig .acc { color:#C8632C; }
  .lab { font: 600 11px/1.2 var(--font-sans); letter-spacing:.12em; text-transform:uppercase; color:#55534E; margin-top:8px; }
</style></head>
<body>
  <div class="row">
    <div class="cell"><div class="fig">8<span class="acc">y</span></div><div class="lab">Deep in Looker</div></div>
    <div class="cell"><div class="fig">40<span class="acc">%</span></div><div class="lab">Avg cost cut</div></div>
    <div class="cell"><div class="fig">5<span class="acc">d</span></div><div class="lab">Diagnostic</div></div>
    <div class="cell"><div class="fig">30+</div><div class="lab">Retail impls</div></div>
  </div>
</body></html>
