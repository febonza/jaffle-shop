<!doctype html>
<html><head><meta charset="utf-8"><title>Radii &amp; shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); }
  .grid { display:grid; grid-template-columns:repeat(5, 1fr); gap:14px; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width:64px; height:64px; background:#fff; border:1px solid var(--rule-soft); }
  .tag { font: 500 11px/1 var(--font-mono); color:var(--ink-3); }
  .name { font: 600 11px/1 var(--font-sans); color:var(--ink); }
</style></head>
<body>
  <div class="grid">
    <div class="cell"><div class="box" style="border-radius:0"></div><div class="name">r-0</div><div class="tag">0px</div></div>
    <div class="cell"><div class="box" style="border-radius:2px"></div><div class="name">r-1</div><div class="tag">2px</div></div>
    <div class="cell"><div class="box" style="border-radius:4px"></div><div class="name">r-2</div><div class="tag">4px</div></div>
    <div class="cell"><div class="box" style="border-radius:8px"></div><div class="name">r-3</div><div class="tag">8px</div></div>
    <div class="cell"><div class="box" style="box-shadow:0 2px 8px rgba(17,17,17,0.06),0 8px 24px rgba(17,17,17,0.04); border:0"></div><div class="name">shadow-2</div><div class="tag">soft</div></div>
  </div>
</body></html>
