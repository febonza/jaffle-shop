<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); }
  .row { display:flex; align-items:center; gap:12px; padding:5px 0; }
  .bar { height:12px; background:#111; }
  .tok { font: 500 12px/1 var(--font-mono); color:var(--ink); min-width:52px; }
  .px  { font: 500 12px/1 var(--font-mono); color:var(--ink-3); margin-left:auto; }
</style></head>
<body>
  <div class="row"><div class="tok">--s-1</div><div class="bar" style="width:4px"></div><div class="px">4</div></div>
  <div class="row"><div class="tok">--s-2</div><div class="bar" style="width:8px"></div><div class="px">8</div></div>
  <div class="row"><div class="tok">--s-3</div><div class="bar" style="width:12px"></div><div class="px">12</div></div>
  <div class="row"><div class="tok">--s-4</div><div class="bar" style="width:16px"></div><div class="px">16</div></div>
  <div class="row"><div class="tok">--s-5</div><div class="bar" style="width:24px"></div><div class="px">24</div></div>
  <div class="row"><div class="tok">--s-6</div><div class="bar" style="width:32px"></div><div class="px">32</div></div>
  <div class="row"><div class="tok">--s-7</div><div class="bar" style="width:48px"></div><div class="px">48</div></div>
  <div class="row"><div class="tok">--s-8</div><div class="bar" style="width:64px"></div><div class="px">64</div></div>
</body></html>
