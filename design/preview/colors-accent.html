<!doctype html>
<html><head><meta charset="utf-8"><title>Accent</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .sw { border:1px solid var(--rule-soft); }
  .chip { height:76px; }
  .meta { padding:8px 10px 10px; border-top:1px solid var(--rule-soft); }
  .name { font: 600 12px/1.2 var(--font-sans); color:var(--ink); }
  .hex  { font: 500 11px/1.4 var(--font-mono); color:var(--ink-3); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#C8632C"></div><div class="meta"><div class="name">Accent</div><div class="hex">#C8632C · CTA</div></div></div>
    <div class="sw"><div class="chip" style="background:#9E4B1E"></div><div class="meta"><div class="name">Accent Deep</div><div class="hex">#9E4B1E · hover</div></div></div>
    <div class="sw"><div class="chip" style="background:#F2D9C5"></div><div class="meta"><div class="name">Accent Soft</div><div class="hex">#F2D9C5 · tint</div></div></div>
  </div>
</body></html>
