<!doctype html>
<html><head><meta charset="utf-8"><title>Ink scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .row { display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; }
  .sw { border:1px solid var(--rule-soft); }
  .chip { height:76px; }
  .meta { padding:8px 10px 10px; border-top:1px solid var(--rule-soft); }
  .name { font: 600 12px/1.2 var(--font-sans); color:var(--ink); }
  .hex  { font: 500 11px/1.4 var(--font-mono); color:var(--ink-3); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#111111"></div><div class="meta"><div class="name">Ink</div><div class="hex">#111 · text</div></div></div>
    <div class="sw"><div class="chip" style="background:#2A2A2A"></div><div class="meta"><div class="name">Ink 2</div><div class="hex">#2A2A2A · body</div></div></div>
    <div class="sw"><div class="chip" style="background:#55534E"></div><div class="meta"><div class="name">Ink 3</div><div class="hex">#55534E · muted</div></div></div>
    <div class="sw"><div class="chip" style="background:#8A8578"></div><div class="meta"><div class="name">Ink 4</div><div class="hex">#8A8578 · faint</div></div></div>
  </div>
</body></html>
