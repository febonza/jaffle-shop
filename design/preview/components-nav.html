<!doctype html>
<html><head><meta charset="utf-8"><title>Nav + footer</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:0; background:var(--paper); }
  .nav { display:flex; align-items:center; justify-content:space-between; padding:18px 28px; border-bottom:1px solid #111; }
  .nav img { height:34px; }
  .links { display:flex; gap:28px; }
  .links a { font: 500 14px/1 var(--font-sans); color:#111; text-decoration:none; }
  .links a:hover { color:#9E4B1E; }
  .cta { font: 600 13px/1 var(--font-sans); background:#111; color:#F5F1EA; padding:10px 16px; text-decoration:none; }
  .foot { display:flex; justify-content:space-between; padding:18px 28px; border-top:1px solid var(--rule-soft); margin-top:14px; }
  .foot .small { font: 500 12px/1 var(--font-mono); color:#55534E; }
</style></head>
<body>
  <div class="nav">
    <img src="../assets/logo-horizontal.svg" alt="">
    <div class="links"><a>Approach</a><a>Services</a><a>Case studies</a><a>About</a></div>
    <a class="cta" href="#">Book a call →</a>
  </div>
  <div class="foot">
    <span class="small">© 2026 bonzanini.works</span>
    <span class="small">felipe@bonzanini.co · linkedin</span>
  </div>
</body></html>
