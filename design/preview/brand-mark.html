<!doctype html>
<html><head><meta charset="utf-8"><title>Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; background:var(--paper); display:grid; grid-template-columns:repeat(4, 1fr); }
  .cell { padding:20px; display:flex; flex-direction:column; align-items:center; gap:8px; }
  .cell img { width:56px; height:56px; }
  .lab { font: 500 11px/1 var(--font-mono); color:#55534E; }
  .cell.dark { background:#161513; }
  .cell.dark .lab { color:#C9C3B6; }
</style></head>
<body>
  <div class="cell"><img src="../assets/mark.svg" alt=""><div class="lab">mark · 56</div></div>
  <div class="cell"><img src="../assets/mark.svg" style="width:32px;height:32px" alt=""><div class="lab">mark · 32</div></div>
  <div class="cell"><img src="../assets/mark.svg" style="width:20px;height:20px" alt=""><div class="lab">mark · 20</div></div>
  <div class="cell dark"><img src="../assets/favicon.svg" alt=""><div class="lab">app icon</div></div>
</body></html>
