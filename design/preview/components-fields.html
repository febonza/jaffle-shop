<!doctype html>
<html><head><meta charset="utf-8"><title>Form fields</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); }
  .grid { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  label { font: 600 11px/1 var(--font-sans); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); display:block; margin-bottom:8px; }
  .input { width:100%; box-sizing:border-box; background:transparent; border:0; border-bottom:1px solid #111; padding:8px 0; font: 400 16px/1.4 var(--font-sans); color:#111; outline:none; }
  .input:focus { border-color:#C8632C; }
  .input::placeholder { color:#8A8578; }
  select.input { appearance:none; background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 12'><path d='M2 4 L6 8 L10 4' stroke='%23111' fill='none' stroke-width='1.25'/></svg>") right center / 12px no-repeat; }
</style></head>
<body>
  <div class="grid">
    <div><label>Name</label><input class="input" value="Felipe" /></div>
    <div><label>Email</label><input class="input" placeholder="you@company.com" /></div>
    <div><label>Company</label><input class="input" placeholder="Where you work" /></div>
    <div><label>Engagement</label><select class="input"><option>Diagnostic Week</option></select></div>
  </div>
</body></html>
