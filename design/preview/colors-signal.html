<!doctype html>
<html><head><meta charset="utf-8"><title>Signal colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .sw { border:1px solid var(--rule-soft); }
  .chip { height:76px; display:flex; align-items:center; justify-content:center;
          font: 500 13px/1 var(--font-mono); color:#fff; }
  .meta { padding:8px 10px 10px; border-top:1px solid var(--rule-soft); }
  .name { font: 600 12px/1.2 var(--font-sans); color:var(--ink); }
  .hex  { font: 500 11px/1.4 var(--font-mono); color:var(--ink-3); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#3C6E47">+14.2%</div><div class="meta"><div class="name">Signal Pos</div><div class="hex">#3C6E47 · data only</div></div></div>
    <div class="sw"><div class="chip" style="background:#B23A2E">−8.6%</div><div class="meta"><div class="name">Signal Neg</div><div class="hex">#B23A2E · data only</div></div></div>
    <div class="sw"><div class="chip" style="background:#2E4A6B">INFO</div><div class="meta"><div class="name">Signal Info</div><div class="hex">#2E4A6B · data only</div></div></div>
  </div>
</body></html>
