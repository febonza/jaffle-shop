<!doctype html>
<html><head><meta charset="utf-8"><title>Pull quote</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:28px 32px; background:#EDE7DD; }
  .quote { font-family:var(--font-serif); font-size:26px; line-height:1.25; color:#111; letter-spacing:-0.015em; font-weight:400; margin:0; text-wrap:balance; }
  .attr { display:flex; align-items:center; gap:12px; margin-top:18px; }
  .rule { height:1px; width:32px; background:#111; }
  .name { font: 600 12px/1.3 var(--font-sans); color:#111; letter-spacing:.02em; }
  .role { font: 400 12px/1.3 var(--font-sans); color:#55534E; }
</style></head>
<body>
  <p class="quote">“Felipe cut our Looker bill 40% in three weeks and somehow the team actually started using it.”</p>
  <div class="attr">
    <div class="rule"></div>
    <div><div class="name">VP Analytics</div><div class="role">Mid-market retailer, ~$800M GMV</div></div>
  </div>
</body></html>
