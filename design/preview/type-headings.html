<!doctype html>
<html><head><meta charset="utf-8"><title>Heading scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px 24px; background:var(--paper); color:var(--ink); }
  .row { display:flex; align-items:baseline; gap:16px; padding:6px 0; border-bottom:1px solid var(--rule-soft); }
  .row:last-child { border-bottom:0; }
  .sample { font-family:var(--font-serif); letter-spacing:-0.02em; line-height:1.05; font-weight:400; }
  .tag { font: 500 11px/1 var(--font-mono); color:var(--ink-3); margin-left:auto; white-space:nowrap; }
</style></head>
<body>
  <div class="row"><div class="sample" style="font-size:56px">Heading 1</div><div class="tag">56 · h1</div></div>
  <div class="row"><div class="sample" style="font-size:40px">Heading 2</div><div class="tag">40 · h2</div></div>
  <div class="row"><div class="sample" style="font-size:28px">Heading 3</div><div class="tag">28 · h3</div></div>
  <div class="row"><div class="sample" style="font-size:20px; font-family:var(--font-sans); font-weight:600; letter-spacing:0">Heading 4</div><div class="tag">20 sans · h4</div></div>
</body></html>
