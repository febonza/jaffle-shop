<!doctype html>
<html><head><meta charset="utf-8"><title>Eyebrow &amp; mono</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px 24px; background:var(--paper); }
  .stack > * + * { margin-top:14px; }
  .eyebrow { font: 600 12px/1 var(--font-sans); letter-spacing:.14em; text-transform:uppercase; color:var(--ink-3); }
  .mono-big { font: 500 28px/1 var(--font-mono); color:var(--ink); letter-spacing:-0.01em; font-variant-numeric:tabular-nums; }
  .mono-sm  { font: 500 13px/1.4 var(--font-mono); color:var(--ink-3); }
  .label { font: 500 11px/1 var(--font-mono); color:var(--ink-3); }
</style></head>
<body>
  <div class="stack">
    <div class="eyebrow">Diagnostic week · 05</div>
    <div class="mono-big">$412,000 <span style="color:#C8632C">↓ 38%</span></div>
    <div class="mono-sm">looker.explore.query_latency_p95 = 1.42s</div>
    <div class="label">Inter 12 eyebrow · JetBrains Mono 28/13 data</div>
  </div>
</body></html>
