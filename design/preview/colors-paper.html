<!doctype html>
<html><head><meta charset="utf-8"><title>Paper scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:20px; background:var(--paper); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .sw { border:1px solid var(--rule-soft); }
  .chip { height:76px; }
  .meta { padding:8px 10px 10px; border-top:1px solid var(--rule-soft); }
  .name { font: 600 12px/1.2 var(--font-sans); color:var(--ink); }
  .hex  { font: 500 11px/1.4 var(--font-mono); color:var(--ink-3); margin-top:2px; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#F5F1EA"></div><div class="meta"><div class="name">Paper</div><div class="hex">#F5F1EA · page bg</div></div></div>
    <div class="sw"><div class="chip" style="background:#EDE7DD"></div><div class="meta"><div class="name">Paper 2</div><div class="hex">#EDE7DD · section</div></div></div>
    <div class="sw"><div class="chip" style="background:#E3DBCC"></div><div class="meta"><div class="name">Paper 3</div><div class="hex">#E3DBCC · inset</div></div></div>
  </div>
</body></html>
