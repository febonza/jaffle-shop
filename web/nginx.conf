server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Docker's embedded DNS — resolves container names lazily (handles restarts gracefully)
    resolver 127.0.0.11 valid=30s ipv6=off;

    # API reverse proxy — FastAPI handles the /api/ prefix as-is
    location /api/ {
        set $upstream_api http://api:8001;
        proxy_pass         $upstream_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Elementary report — written by Dagster at runtime, served from shared volume
    location /elementary/ {
        alias /usr/share/nginx/html/elementary/;
        try_files $uri $uri/ =404;
    }

    # React SPA — all other paths fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
